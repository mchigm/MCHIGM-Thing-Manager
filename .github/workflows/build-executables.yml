name: Build Executables and Installers

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger from GitHub UI
    inputs:
      version:
        description: 'Release version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    name: Build Windows Executable and Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build executable
        run: pyinstaller MCHIGM-Thing-Manager.spec

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Build Windows installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_windows.iss
        shell: pwsh

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: MCHIGM-Thing-Manager-Windows-Executable
          path: dist/MCHIGM-Thing-Manager.exe
          if-no-files-found: error

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: MCHIGM-Thing-Manager-Windows-Installer
          path: installer_output/MCHIGM-Thing-Manager-Setup.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS Application and Installer
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build application
        run: pyinstaller MCHIGM-Thing-Manager.spec

      - name: Build macOS .pkg installer
        run: |
          chmod +x build_macos_pkg.sh
          ./build_macos_pkg.sh

      - name: Create ZIP of app bundle
        run: |
          cd dist
          zip -r -y "MCHIGM-Thing-Manager-macOS.zip" "MCHIGM Thing Manager.app"

      - name: Upload macOS application (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: MCHIGM-Thing-Manager-macOS-App
          path: dist/MCHIGM-Thing-Manager-macOS.zip
          if-no-files-found: error

      - name: Upload macOS installer (.pkg)
        uses: actions/upload-artifact@v4
        with:
          name: MCHIGM-Thing-Manager-macOS-Installer
          path: installer_output/MCHIGM-Thing-Manager-*.pkg
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Windows executable
        uses: actions/download-artifact@v4
        with:
          name: MCHIGM-Thing-Manager-Windows-Executable
          path: ./artifacts/windows

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: MCHIGM-Thing-Manager-Windows-Installer
          path: ./artifacts/windows

      - name: Download macOS app
        uses: actions/download-artifact@v4
        with:
          name: MCHIGM-Thing-Manager-macOS-App
          path: ./artifacts/macos

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: MCHIGM-Thing-Manager-macOS-Installer
          path: ./artifacts/macos

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.event.inputs.version }}
          files: |
            ./artifacts/windows/MCHIGM-Thing-Manager.exe
            ./artifacts/windows/MCHIGM-Thing-Manager-Setup.exe
            ./artifacts/macos/MCHIGM-Thing-Manager-macOS.zip
            ./artifacts/macos/*.pkg
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation

            ### Windows
            **Recommended:** Download and run `MCHIGM-Thing-Manager-Setup.exe` (installer)
            **Alternative:** Download `MCHIGM-Thing-Manager.exe` (standalone executable)

            ### macOS
            **Recommended:** Download and run `MCHIGM-Thing-Manager-*.pkg` (installer)
            **Alternative:** Download and extract `MCHIGM-Thing-Manager-macOS.zip`

            ## What's New
            See the full changelog below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

