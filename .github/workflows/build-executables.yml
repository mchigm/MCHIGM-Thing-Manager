name: Build Executables and Installers

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version or tag name (free-form)'
        required: true
        default: '1.0.0'
      release_notes:
        description: 'Release notes in Markdown'
        required: false
        default: ''

permissions:
  contents: write

env:
  APP_RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_version || github.ref_name }}
  APP_RELEASE_NOTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_notes || '' }}

jobs:
  build-windows:
    name: Build Windows Executable and Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build executable
        run: pyinstaller MCHIGM-Thing-Manager.spec

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_windows.iss
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: MCHIGM-Thing-Manager-Windows
          path: |
            dist/MCHIGM-Thing-Manager.exe
            installer_output/MCHIGM-Thing-Manager-Setup.exe
          if-no-files-found: error

  build-macos:
    name: Build macOS Application and Installer
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build application
        run: pyinstaller MCHIGM-Thing-Manager.spec

      - name: Build macOS .pkg installer
        run: |
          chmod +x build_macos_pkg.sh
          ./build_macos_pkg.sh

      - name: Create ZIP of app bundle
        run: |
          cd dist
          zip -r -y "MCHIGM-Thing-Manager-macOS.zip" "MCHIGM Thing Manager.app"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: MCHIGM-Thing-Manager-macOS
          path: |
            dist/MCHIGM-Thing-Manager-macOS.zip
            installer_output/MCHIGM-Thing-Manager-*.pkg
          if-no-files-found: error

  build-linux:
    name: Build Linux Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libxcb-cursor0 libxkbcommon-x11-0

      - name: Build Linux package
        run: |
          chmod +x build_linux.sh
          ./build_linux.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: MCHIGM-Thing-Manager-Linux
          path: |
            installer_output/MCHIGM-Thing-Manager-*-x86_64.AppImage
            installer_output/MCHIGM-Thing-Manager-*-Linux.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Resolve release metadata
        id: metadata
        shell: bash
        run: |
          printf 'release_version=%s\n' "${APP_RELEASE_VERSION}" >> "${GITHUB_OUTPUT}"
          {
            echo 'release_notes<<EOF'
            printf '%s\n' "${APP_RELEASE_NOTES}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Download Windows artifacts
        uses: actions/download-artifact@v5
        with:
          name: MCHIGM-Thing-Manager-Windows
          path: ./artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v5
        with:
          name: MCHIGM-Thing-Manager-macOS
          path: ./artifacts/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: MCHIGM-Thing-Manager-Linux
          path: ./artifacts/linux

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets

          for dir in ./artifacts/windows ./artifacts/macos ./artifacts/linux; do
            while IFS= read -r file; do
              cp "$file" "release-assets/$(basename "$file")"
            done < <(find "$dir" -type f \( \
              -name '*.exe' -o \
              -name '*.pkg' -o \
              -name '*.zip' -o \
              -name '*.AppImage' -o \
              -name '*.tar.gz' \
            \))
          done

          expected_files=(
            "MCHIGM-Thing-Manager-Setup.exe"
            "MCHIGM-Thing-Manager.exe"
            "MCHIGM-Thing-Manager-macOS.zip"
            "MCHIGM-Thing-Manager-*.pkg"
            "MCHIGM-Thing-Manager-*.AppImage"
            "MCHIGM-Thing-Manager-*-Linux.tar.gz"
          )

          for pattern in "${expected_files[@]}"; do
            if ! compgen -G "release-assets/${pattern}" > /dev/null; then
              echo "Missing expected release asset matching: ${pattern}" >&2
              exit 1
            fi
          done

      - name: Prepare release body
        id: body
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.metadata.outputs.release_version }}
          RELEASE_NOTES: ${{ steps.metadata.outputs.release_notes }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          version = os.environ["RELEASE_VERSION"].strip()
          notes = os.environ.get("RELEASE_NOTES", "").rstrip()
          repository = os.environ.get("REPOSITORY", "").strip()
          commit_sha = os.environ.get("COMMIT_SHA", "").strip()
          changelog = Path("CHANGELOG").read_text(encoding="utf-8").strip()
          changelog_url = f"https://github.com/{repository}/blob/{commit_sha}/CHANGELOG" if repository and commit_sha else ""

          lines = [
              f"# Release {version}",
              "",
              "## What's New",
              "",
              f"Source: [CHANGELOG]({changelog_url})" if changelog_url else "Source: CHANGELOG",
              "",
              notes if notes else changelog,
              "",
              "## Installation",
              "",
              "### Windows",
              "- Recommended: `MCHIGM-Thing-Manager-Setup.exe`",
              "- Portable: `MCHIGM-Thing-Manager.exe`",
              "",
              "### macOS",
              "- Recommended: `MCHIGM-Thing-Manager-*.pkg`",
              "- Portable: `MCHIGM-Thing-Manager-macOS.zip`",
              "",
              "### Linux",
              "- Recommended: `MCHIGM-Thing-Manager-*.AppImage`",
              "- Portable archive: `MCHIGM-Thing-Manager-Linux.tar.gz`",
            ]

          if notes:
              lines.extend(["", "## Release Notes", "", notes])

          Path("release-body.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          echo "body_path=release-body.md" >> "${GITHUB_OUTPUT}"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_id) || steps.metadata.outputs.release_version }}
          name: ${{ steps.metadata.outputs.release_version }}
          target_commitish: ${{ github.sha }}
          files: |
            ./release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: false
          body_path: ${{ steps.body.outputs.body_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
